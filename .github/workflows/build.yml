name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Java for Android
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Setup Flutter (This is what caused the crash!)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Install Flet
      - name: Install Flet
        run: pip install flet

      # 5. Build the APK
      - name: Build APK
        run: flet build apk

      # 6. Upload the finished app
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TrixxDownloader-APK
          path: build/**/*.apk
